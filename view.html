<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NY vs LA — Export Slides</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: 'DM Sans', sans-serif;
    padding: 24px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    color-scheme: light;
  }
  h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 28px;
    text-align: center;
  }
  .slide-block {
    width: 100%;
    max-width: 400px;
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 2px;
  }
  .dl-btn {
    width: 100%;
    padding: 13px;
    background: #EDEBE4;
    border: none;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #373930;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: block;
  }
  .slide-num {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
  }
  #status {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-bottom: 20px;
    min-height: 18px;
  }
</style>
</head>
<body>
<h1>NY vs LA · Export Slides</h1>
<div id="status">Loading fonts…</div>
<div id="slides-container"></div>

<script>
const OLIVE = '#373930';
const LINEN = '#EDEBE4';
const ACCENT = '#8B7355';
const S = 1080;

function hex(h, a=1) {
  const r = parseInt(h.slice(1,3),16);
  const g = parseInt(h.slice(3,5),16);
  const b = parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function makeCanvas() {
  const c = document.createElement('canvas');
  c.width = S; c.height = S;
  return c;
}

// ── text helpers ──
function dmSans(size, weight=400) { return `${weight} ${size}px 'DM Sans', sans-serif`; }
function playfair(size, weight=400, italic=false) {
  return `${italic?'italic ':''} ${weight} ${size}px 'Playfair Display', serif`;
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (let w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      line = w; cy += lineH;
    } else { line = test; }
  }
  if (line) ctx.fillText(line, x, cy);
  return cy;
}

// ── SLIDE 1 ──
function drawSlide1(canvas) {
  const ctx = canvas.getContext('2d');
  const pad = 108;
  ctx.fillStyle = LINEN;
  ctx.fillRect(0,0,S,S);

  const lh = 92;
  // Total block: eyebrow(30) + gap(44) + 3 headline lines(3*92) + gap(64) + divider(2) + gap(24) + handle(30)
  const totalH = 30 + 44 + lh*3 + 64 + 2 + 24 + 30;
  let ty = (S - totalH) / 2;

  // eyebrow
  ctx.font = dmSans(22, 500);
  ctx.fillStyle = hex(OLIVE, 0.45);
  ctx.letterSpacing = '4px';
  ctx.fillText('STUDIO SALARY DATABASE', pad, ty + 22);
  ctx.letterSpacing = '0px';
  ty += 30 + 44;

  // headline line 1
  ctx.font = playfair(80, 400, false);
  ctx.fillStyle = hex(OLIVE, 1);
  ctx.fillText('Is it better to be a', pad, ty); ty += lh;
  ctx.fillText('Pilates instructor in', pad, ty); ty += lh;

  // "NY or LA?" mixed italic
  ctx.font = playfair(80, 400, true);
  ctx.fillStyle = hex(OLIVE, 0.75);
  ctx.fillText('NY', pad, ty);
  const nyW = ctx.measureText('NY').width;

  ctx.font = playfair(80, 400, false);
  ctx.fillStyle = hex(OLIVE, 1);
  ctx.fillText(' or ', pad + nyW, ty);
  const orW = ctx.measureText(' or ').width;

  ctx.font = playfair(80, 400, true);
  ctx.fillStyle = hex(OLIVE, 0.75);
  ctx.fillText('LA', pad + nyW + orW, ty);
  const laW = ctx.measureText('LA').width;

  ctx.font = playfair(80, 400, false);
  ctx.fillStyle = hex(OLIVE, 1);
  ctx.fillText('?', pad + nyW + orW + laW, ty);
  ty += lh + 64;

  // divider
  ctx.fillStyle = hex(OLIVE, 0.18);
  ctx.fillRect(pad, ty, 72, 2);
  ty += 2 + 24;

  // handle
  ctx.font = dmSans(22, 400);
  ctx.fillStyle = hex(OLIVE, 0.32);
  ctx.letterSpacing = '2px';
  ctx.fillText('@paigelovespilates', pad, ty + 22);
  ctx.letterSpacing = '0px';
}

// ── SLIDE 2 ──
function drawSlide2(canvas) {
  const ctx = canvas.getContext('2d');
  const pad = 108;
  ctx.fillStyle = LINEN;
  ctx.fillRect(0,0,S,S);

  // ghost "02" — centered vertically a bit above center
  ctx.font = playfair(300, 600);
  ctx.fillStyle = hex(OLIVE, 0.05);
  ctx.textAlign = 'center';
  ctx.fillText('02', S/2, S/2 + 100);

  // Total block: label(26) + gap(36) + 3 headline lines(3*76) + gap(56) + dots row(32)
  const lh = 76;
  const totalH = 26 + 36 + lh*3 + 56 + 32;
  let ty = (S - totalH) / 2;

  // label
  ctx.font = dmSans(22, 500);
  ctx.fillStyle = hex(OLIVE, 0.45);
  ctx.letterSpacing = '4px';
  ctx.fillText('THE BREAKDOWN', S/2, ty + 22);
  ctx.letterSpacing = '0px';
  ty += 26 + 36;

  // headline
  ctx.font = playfair(66, 400, false);
  ctx.fillStyle = hex(OLIVE, 1);
  ctx.fillText("Let's look at the data.", S/2, ty); ty += lh;
  ctx.fillText("We'll consider", S/2, ty); ty += lh;

  // line 3: "average pay and instructor satisfaction."
  ctx.font = playfair(66, 400, true);
  const apW = ctx.measureText('average pay').width;
  ctx.font = playfair(66, 400, false);
  const andW = ctx.measureText(' and ').width;
  ctx.font = playfair(66, 400, true);
  const isW = ctx.measureText('instructor satisfaction.').width;
  const totalLineW = apW + andW + isW;
  let lx = S/2 - totalLineW/2;

  ctx.font = playfair(66, 400, true);
  ctx.fillText('average pay', lx, ty); lx += apW;
  ctx.font = playfair(66, 400, false);
  ctx.fillText(' and ', lx, ty); lx += andW;
  ctx.font = playfair(66, 400, true);
  ctx.fillText('instructor satisfaction.', lx, ty);
  ty += lh + 56;

  // criteria dots
  const labels = ['Pay per class', 'Instructor satisfaction'];
  const colW = 280;
  const startX = S/2 - colW;
  labels.forEach((label, i) => {
    const lx2 = startX + i * colW;
    ctx.beginPath();
    ctx.arc(lx2 + 7, ty - 4, 7, 0, Math.PI*2);
    ctx.fillStyle = ACCENT;
    ctx.fill();
    ctx.font = dmSans(24, 400);
    ctx.fillStyle = hex(OLIVE, 0.6);
    ctx.textAlign = 'left';
    ctx.fillText(label, lx2 + 22, ty + 4);
  });

  ctx.textAlign = 'left';
}

// ── SLIDE 3 ──
function drawSlide3(canvas) {
  const ctx = canvas.getContext('2d');
  const pad = 108;
  ctx.fillStyle = LINEN;
  ctx.fillRect(0,0,S,S);

  // Total block: label(26)+gap(32)+headline2lines(2*64)+gap(72)+city labels(26)+gap(12)+numbers(180)+gap(20)+badge(38)+gap(60)+footnote(26)
  const totalH = 26+32+(64*2)+72+26+12+180+20+38+60+26;
  let ty = (S - totalH) / 2;

  // topic label
  ctx.font = dmSans(22, 500);
  ctx.fillStyle = hex(OLIVE, 0.45);
  ctx.letterSpacing = '4px';
  ctx.fillText('PAY PER CLASS', pad, ty + 22);
  ctx.letterSpacing = '0px';
  ty += 26 + 32;

  // headline
  ctx.font = playfair(56, 400);
  ctx.fillStyle = hex(OLIVE, 0.8);
  ctx.fillText('When it comes to pay,', pad, ty); ty += 64;
  ctx.fillText('NYC wins.', pad, ty); ty += 64 + 72;

  // city name labels side by side
  ctx.font = dmSans(22, 500);
  ctx.letterSpacing = '3px';
  ctx.fillStyle = hex(OLIVE, 0.5);
  ctx.fillText('NEW YORK', pad, ty + 22);
  ctx.fillStyle = hex(OLIVE, 0.28);
  ctx.fillText('LOS ANGELES', pad + 300, ty + 22);
  ctx.letterSpacing = '0px';
  ty += 26 + 12;

  // big numbers
  ctx.font = playfair(190, 600);
  ctx.fillStyle = hex(OLIVE, 1);
  ctx.fillText('$52', pad, ty + 180);

  ctx.font = playfair(140, 600);
  ctx.fillStyle = hex(OLIVE, 0.28);
  ctx.fillText('$48', pad + 300, ty + 150);
  ty += 180 + 20;

  // winner badge
  const btext = '↑  WINNER';
  ctx.font = dmSans(20, 500);
  ctx.letterSpacing = '2px';
  const bw = ctx.measureText(btext).width + 32;
  ctx.fillStyle = hex(OLIVE, 0.09);
  ctx.beginPath();
  ctx.roundRect(pad, ty, bw, 38, 3);
  ctx.fill();
  ctx.fillStyle = hex(OLIVE, 0.65);
  ctx.fillText(btext, pad + 14, ty + 26);
  ctx.letterSpacing = '0px';
  ty += 38 + 60;

  // footnote
  ctx.font = dmSans(22, 400);
  ctx.fillStyle = hex(OLIVE, 0.35);
  ctx.fillText('An 8% difference  ·  avg per class', pad, ty + 22);
}

// ── SLIDE 4 ──
function drawSlide4(canvas) {
  const ctx = canvas.getContext('2d');
  const pad = 108;
  ctx.fillStyle = LINEN;
  ctx.fillRect(0,0,S,S);

  // Total block: label(26)+gap(32)+hl1(60)+gap(8)+hl2(60)+gap(8)+sub(52)+gap(60)+(3 bar rows: each 26+12+5+52=95)+footnote gap(40)+footnote(26)
  const barRowH = 26 + 12 + 5 + 52;
  const totalH = 26+32+60+8+60+8+52+60+(barRowH*3)+40+26;
  let ty = (S - totalH) / 2;

  // topic label
  ctx.font = dmSans(22, 500);
  ctx.fillStyle = hex(OLIVE, 0.45);
  ctx.letterSpacing = '4px';
  ctx.fillText('INSTRUCTOR SATISFACTION', pad, ty + 22);
  ctx.letterSpacing = '0px';
  ty += 26 + 32;

  // headline
  ctx.font = playfair(52, 600);
  ctx.fillStyle = hex(OLIVE, 1);
  ctx.fillText('New York instructors are happier', pad, ty + 52); ty += 60 + 8;
  ctx.fillText('than almost anywhere in the world.', pad, ty + 52); ty += 60 + 8;

  // subheadline
  ctx.font = playfair(46, 400, true);
  ctx.fillStyle = hex(OLIVE, 0.5);
  ctx.fillText('LA is… average.', pad, ty + 46); ty += 52 + 60;

  // bars
  const barData = [
    { city: 'NEW YORK', pct: 86, dim: false },
    { city: 'LOS ANGELES', pct: 80, dim: true },
    { city: 'GLOBAL AVG', pct: 79, dim: true },
  ];
  const barW = S - pad*2;

  barData.forEach(d => {
    ctx.font = dmSans(22, 500);
    ctx.fillStyle = hex(OLIVE, d.dim ? 0.32 : 0.55);
    ctx.letterSpacing = '3px';
    ctx.fillText(d.city, pad, ty + 22);
    ctx.letterSpacing = '0px';

    ctx.font = playfair(42, 600);
    ctx.fillStyle = hex(OLIVE, d.dim ? 0.32 : 1);
    ctx.textAlign = 'right';
    ctx.fillText(d.pct + '%', S - pad, ty + 22);
    ctx.textAlign = 'left';
    ty += 26 + 12;

    ctx.fillStyle = hex(OLIVE, 0.1);
    ctx.beginPath(); ctx.roundRect(pad, ty, barW, 5, 2); ctx.fill();
    ctx.fillStyle = hex(OLIVE, d.dim ? 0.22 : 0.85);
    ctx.beginPath(); ctx.roundRect(pad, ty, barW * d.pct/100, 5, 2); ctx.fill();
    ty += 5 + 52;
  });

  ty += 40;
  ctx.font = dmSans(20, 400);
  ctx.fillStyle = hex(OLIVE, 0.32);
  ctx.fillText('Based on instructor-reported studio ratings', pad, ty + 20);
}

// ── SLIDE 5 ──
function drawSlide5(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = OLIVE;
  ctx.fillRect(0,0,S,S);

  // Total block: eyebrow(26)+gap(44)+hl1(88)+hl2(88)+gap(36)+body1(34)+body2(34)+gap(60)+btn(60)+gap(52)+handle(26)
  const totalH = 26+44+88+88+36+34+34+60+60+52+26;
  let ty = (S - totalH) / 2;

  // eyebrow
  ctx.font = dmSans(21, 500);
  ctx.fillStyle = hex(LINEN, 0.42);
  ctx.textAlign = 'center';
  ctx.letterSpacing = '2.5px';
  ctx.fillText('PAIGELOVESPILATES.COM/DATABASE', S/2, ty + 22);
  ctx.letterSpacing = '0px';
  ty += 26 + 44;

  // headline
  ctx.font = playfair(80, 600);
  ctx.fillStyle = hex(LINEN, 1);
  ctx.fillText('See how your city', S/2, ty + 80); ty += 88;
  ctx.fillText('stacks up.', S/2, ty + 80); ty += 88 + 36;

  // body
  ctx.font = dmSans(28, 300);
  ctx.fillStyle = hex(LINEN, 0.55);
  ctx.fillText('Curious how these stats look for other cities?', S/2, ty + 32); ty += 34;
  ctx.fillText('Join the free Studio Salary Database.', S/2, ty + 32); ty += 34 + 60;

  // CTA button
  ctx.font = dmSans(22, 500);
  ctx.letterSpacing = '3px';
  const btnText = 'JOIN THE DATABASE';
  const btnW = ctx.measureText(btnText).width + 90;
  const btnX = S/2 - btnW/2;
  ctx.strokeStyle = hex(LINEN, 0.32);
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(btnX, ty, btnW, 60, 2); ctx.stroke();
  ctx.fillStyle = hex(LINEN, 1);
  ctx.fillText(btnText, S/2, ty + 38);
  ctx.letterSpacing = '0px';
  ty += 60 + 52;

  // handle
  ctx.font = dmSans(22, 400);
  ctx.fillStyle = hex(LINEN, 0.28);
  ctx.letterSpacing = '2px';
  ctx.fillText('@paigelovespilates', S/2, ty + 22);
  ctx.letterSpacing = '0px';

  ctx.textAlign = 'left';
}

const drawFns = [drawSlide1, drawSlide2, drawSlide3, drawSlide4, drawSlide5];
const slideNames = ['slide-1-hook', 'slide-2-breakdown', 'slide-3-pay', 'slide-4-satisfaction', 'slide-5-cta'];

function buildSlides() {
  const container = document.getElementById('slides-container');
  const status = document.getElementById('status');
  status.textContent = '';

  drawFns.forEach((fn, i) => {
    const block = document.createElement('div');
    block.className = 'slide-block';

    const label = document.createElement('div');
    label.className = 'slide-num';
    label.textContent = `Slide ${i+1} of 5`;

    const canvas = makeCanvas();
    fn(canvas);

    const btn = document.createElement('a');
    btn.className = 'dl-btn';
    btn.textContent = `↓  Save Slide ${i+1}`;
    btn.href = canvas.toDataURL('image/png');
    btn.download = `${slideNames[i]}.png`;

    block.appendChild(label);
    block.appendChild(canvas);
    block.appendChild(btn);
    container.appendChild(block);
  });
}

document.fonts.ready.then(() => {
  // small delay to ensure fonts fully rendered
  setTimeout(buildSlides, 200);
});
</script>

</body>
</html>
