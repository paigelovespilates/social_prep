<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogi Fair Pay Carousel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
width: 1080px;
height: 1080px;
background: #EDEBE4;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Playfair Display’, serif;
overflow: hidden;
}

.slide {
width: 1080px;
height: 1080px;
background: #EDEBE4;
position: relative;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 100px;
}

/* Corner decorative lines */
.corner {
position: absolute;
width: 60px;
height: 60px;
}
.corner–tl { top: 60px; left: 60px; border-top: 1.5px solid #373930; border-left: 1.5px solid #373930; }
.corner–tr { top: 60px; right: 60px; border-top: 1.5px solid #373930; border-right: 1.5px solid #373930; }
.corner–bl { bottom: 60px; left: 60px; border-bottom: 1.5px solid #373930; border-left: 1.5px solid #373930; }
.corner–br { bottom: 60px; right: 60px; border-bottom: 1.5px solid #373930; border-right: 1.5px solid #373930; }

.eyebrow {
font-family: ‘DM Sans’, sans-serif;
font-weight: 300;
font-size: 22px;
letter-spacing: 0.22em;
text-transform: uppercase;
color: #373930;
opacity: 0.6;
margin-bottom: 52px;
}

.headline {
font-family: ‘Playfair Display’, serif;
font-size: 108px;
line-height: 1.0;
color: #373930;
text-align: center;
font-weight: 500;
max-width: 860px;
}

.headline em {
font-style: italic;
font-weight: 400;
}

.rule {
width: 48px;
height: 1.5px;
background: #373930;
margin: 60px auto;
opacity: 0.4;
}

.sub {
font-family: ‘DM Sans’, sans-serif;
font-weight: 300;
font-size: 24px;
letter-spacing: 0.04em;
color: #373930;
text-align: center;
opacity: 0.7;
line-height: 1.6;
}

.handle {
position: absolute;
bottom: 72px;
right: 80px;
font-family: ‘DM Sans’, sans-serif;
font-size: 20px;
font-weight: 300;
letter-spacing: 0.08em;
color: #373930;
opacity: 0.45;
}

/* Subtle background texture dot */
.bg-circle {
position: absolute;
width: 480px;
height: 480px;
border-radius: 50%;
border: 1px solid #373930;
opacity: 0.06;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
pointer-events: none;
}
.bg-circle-2 {
width: 700px;
height: 700px;
opacity: 0.04;
}
</style>

</head>
<body>
<div class="slide">

  <div class="bg-circle"></div>
  <div class="bg-circle bg-circle-2"></div>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <p class="eyebrow">transparency that empowers</p>

  <h1 class="headline">
    yogis deserve<br>to <em>get paid</em><br>too
  </h1>

  <div class="rule"></div>

  <p class="sub">rebuilding the fitness industry with transparency</p>

<span class="handle">@paigelovespilates</span>

</div>
</body>
</html>
